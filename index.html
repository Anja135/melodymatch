<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MelodyMatch</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  background: #0f0f1e;
  color: #f0e6d3;
  font-family: Georgia, serif;
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  overflow: hidden;
}

/* ── SCREENS ── */
.screen { display: none; flex-direction: column; align-items: center; width: 100%; padding: 16px; gap: 12px; }
.screen.active { display: flex; }

.title { font-size: clamp(2rem,7vw,3.2rem); font-weight: bold; text-align: center;
  color: #e8c97a; letter-spacing: 3px; text-shadow: 0 0 20px rgba(232,201,122,0.4); }
.subtitle { font-size: .8rem; letter-spacing: 4px; opacity: .5; text-transform: uppercase; }
.note-row { font-size: 2rem; opacity: .7; letter-spacing: 8px; }

.panel { background: rgba(255,255,255,.04); border: 1px solid rgba(232,201,122,.2);
  border-radius: 18px; padding: 22px 18px; width: 100%; max-width: 380px; }

.hs-box { text-align: center; padding: 10px; background: rgba(232,201,122,.08);
  border-radius: 10px; margin-bottom: 14px; }
.hs-lbl { font-size: .65rem; letter-spacing: 3px; text-transform: uppercase; color: #c9a96e; }
.hs-val { font-size: 1.8rem; color: #e8c97a; font-weight: bold; }

.lvl-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 7px; margin-bottom: 14px; }
.lvl-btn { padding: 10px 5px; border-radius: 9px; border: 1px solid rgba(232,201,122,.2);
  background: rgba(255,255,255,.03); color: #f0e6d3; cursor: pointer; text-align: center;
  touch-action: manipulation; transition: all .15s; }
.lvl-btn:active, .lvl-btn.sel { background: rgba(232,201,122,.18); border-color: #e8c97a; color: #e8c97a; }
.lvl-n { font-size: 1.3rem; font-weight: bold; display: block; }
.lvl-t { font-size: .62rem; opacity: .6; }

.btn { display: block; width: 100%; padding: 13px; border-radius: 11px; border: none;
  cursor: pointer; font-family: Georgia,serif; font-size: .95rem; font-weight: bold;
  letter-spacing: 2px; text-transform: uppercase; margin-bottom: 9px;
  touch-action: manipulation; transition: transform .1s; }
.btn:active { transform: scale(.97); }
.btn-gold { background: linear-gradient(135deg,#c9a96e,#e8c97a); color: #1a0f00; }
.btn-line { background: transparent; color: #c9a96e; border: 1px solid rgba(232,201,122,.35); }

/* ── HUD ── */
.hud { width: 100%; max-width: 420px; display: grid; grid-template-columns: repeat(4,1fr);
  gap: 6px; padding: 9px 12px; background: rgba(255,255,255,.04);
  border: 1px solid rgba(232,201,122,.18); border-radius: 13px; }
.hud-box { text-align: center; }
.hud-lbl { font-size: .56rem; letter-spacing: 2px; text-transform: uppercase; color: #c9a96e; opacity: .7; }
.hud-val { font-size: 1.2rem; color: #e8c97a; font-weight: bold; line-height: 1.2; }
.hud-val.warn { color: #ff6060; animation: blink .5s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

.prog-wrap { width: 100%; max-width: 420px; }
.prog-info { display: flex; justify-content: space-between; font-size: .66rem; opacity: .5; margin-bottom: 3px; }
.prog-bar { height: 5px; background: rgba(255,255,255,.08); border-radius: 3px; overflow: hidden; }
.prog-fill { height: 100%; background: linear-gradient(90deg,#c9a96e,#e8c97a);
  border-radius: 3px; transition: width .4s; }

/* ── GRID ── */
#grid { display: grid; gap: 5px; padding: 11px;
  background: rgba(255,255,255,.03); border: 1px solid rgba(232,201,122,.15);
  border-radius: 15px; touch-action: none; }

.cell {
  width: 52px; height: 52px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.6rem; cursor: pointer;
  border: 1px solid rgba(255,255,255,.08);
  user-select: none; -webkit-user-select: none;
  position: relative; overflow: hidden;
}
@media(max-width:370px){ .cell{width:44px;height:44px;font-size:1.3rem;} }
@media(min-width:480px){ .cell{width:60px;height:60px;font-size:1.9rem;} }

/* Note colors — clearly distinct */
.n0 { background: linear-gradient(135deg,#1a4080,#2060c0); }   /* blue */
.n1 { background: linear-gradient(135deg,#6b1a80,#a030c0); }   /* purple */
.n2 { background: linear-gradient(135deg,#1a6e30,#28a845); }   /* green */
.n3 { background: linear-gradient(135deg,#805010,#c07820); }   /* orange */
.n4 { background: linear-gradient(135deg,#801818,#c02828); }   /* red */
.n5 { background: linear-gradient(135deg,#106868,#18a0a0); }   /* teal */

.cell.sel {
  transform: scale(1.12);
  box-shadow: 0 0 0 3px #e8c97a, 0 0 14px rgba(232,201,122,.6);
  z-index: 2;
}
/* pop = disappear */
.cell.pop { animation: pop .35s ease forwards; pointer-events: none; }
@keyframes pop {
  0%  { transform: scale(1.1); opacity: 1; filter: brightness(2.5); }
  50% { transform: scale(1.4); opacity: .5; }
  100%{ transform: scale(0);   opacity: 0; }
}
/* drop = fall in */
.cell.drop { animation: drop .28s cubic-bezier(.34,1.56,.64,1) forwards; }
@keyframes drop {
  from{ transform: translateY(-60px) scale(.7); opacity:0; }
  to  { transform: translateY(0)     scale(1);  opacity:1; }
}
/* shake = invalid move */
.cell.shake { animation: shake .25s ease; }
@keyframes shake {
  0%,100%{ transform:translateX(0); }
  30%    { transform:translateX(-6px); }
  70%    { transform:translateX(6px); }
}

/* ── GAME FOOTER ── */
.game-btns { display: flex; gap: 8px; width: 100%; max-width: 420px; }
.game-btns .btn { font-size: .72rem; padding: 9px; margin: 0; flex: 1; }

/* ── RESULT ── */
.card { background: rgba(255,255,255,.04); border: 1px solid rgba(232,201,122,.25);
  border-radius: 20px; padding: 36px 26px; width: 100%; max-width: 340px; text-align: center; }
.card-icon { font-size: 3.5rem; margin-bottom: 12px; }
.card-title { font-size: 2rem; font-weight: bold; margin-bottom: 5px; }
.gold { color: #e8c97a; } .silver { color: #a0b0c0; }
.card-sub { font-size: .72rem; letter-spacing: 3px; text-transform: uppercase; opacity: .5; margin-bottom: 18px; }
.stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-bottom: 20px; }
.stat { background: rgba(255,255,255,.04); border-radius: 9px; padding: 11px;
  border: 1px solid rgba(232,201,122,.1); }
.stat-lbl { font-size: .6rem; letter-spacing: 2px; text-transform: uppercase; color: #c9a96e; opacity: .7; }
.stat-val { font-size: 1.4rem; color: #e8c97a; font-weight: bold; }
.rec-badge { display: inline-block; background: linear-gradient(135deg,#c9a96e,#e8c97a);
  color: #1a0f00; font-size: .62rem; font-weight: bold; letter-spacing: 2px;
  padding: 4px 14px; border-radius: 20px; margin-bottom: 10px; }

/* ── MUTE ── */
#mute { position: fixed; top: 12px; right: 12px; z-index: 99;
  width: 38px; height: 38px; border-radius: 50%;
  background: rgba(255,255,255,.07); border: 1px solid rgba(232,201,122,.25);
  color: #c9a96e; font-size: 1.1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  touch-action: manipulation; }
</style>
</head>
<body>

<button id="mute">♪</button>

<!-- ═══ START ═══ -->
<div id="s-start" class="screen active">
  <div class="note-row">♩ ♪ ♫ ♬</div>
  <div class="title">MelodyMatch</div>
  <div class="subtitle">Das Musiknoten-Spiel</div>

  <div class="panel">
    <div class="hs-box">
      <div class="hs-lbl">🏆 Highscore</div>
      <div class="hs-val" id="hs">0</div>
    </div>
    <div class="lvl-grid">
      <button class="lvl-btn sel" data-l="1"><span class="lvl-n">1</span><span class="lvl-t">Adagio</span></button>
      <button class="lvl-btn" data-l="2"><span class="lvl-n">2</span><span class="lvl-t">Andante</span></button>
      <button class="lvl-btn" data-l="3"><span class="lvl-n">3</span><span class="lvl-t">Moderato</span></button>
      <button class="lvl-btn" data-l="4"><span class="lvl-n">4</span><span class="lvl-t">Allegro</span></button>
      <button class="lvl-btn" data-l="5"><span class="lvl-n">5</span><span class="lvl-t">Vivace</span></button>
      <button class="lvl-btn" data-l="6"><span class="lvl-n">6</span><span class="lvl-t">Presto</span></button>
    </div>
    <button class="btn btn-gold" id="btn-play">♫ Spielen</button>
    <button class="btn btn-line" id="btn-help">Wie spielt man?</button>
  </div>
</div>

<!-- ═══ GAME ═══ -->
<div id="s-game" class="screen">
  <div class="hud">
    <div class="hud-box"><div class="hud-lbl">Punkte</div><div class="hud-val" id="h-pts">0</div></div>
    <div class="hud-box"><div class="hud-lbl">Level</div><div class="hud-val" id="h-lvl">1</div></div>
    <div class="hud-box"><div class="hud-lbl">Züge</div><div class="hud-val" id="h-mv">30</div></div>
    <div class="hud-box"><div class="hud-lbl">Zeit</div><div class="hud-val" id="h-tm">60</div></div>
  </div>
  <div class="prog-wrap">
    <div class="prog-info"><span>Ziel: <b id="h-tgt">5000</b></span><span id="h-pct">0%</span></div>
    <div class="prog-bar"><div class="prog-fill" id="h-prog" style="width:0"></div></div>
  </div>
  <div id="grid"></div>
  <div class="game-btns">
    <button class="btn btn-line" id="btn-hint">💡 Tipp</button>
    <button class="btn btn-line" id="btn-menu">← Menü</button>
  </div>
</div>

<!-- ═══ WIN ═══ -->
<div id="s-win" class="screen">
  <div class="card">
    <div class="card-icon">🎵</div>
    <div id="rec" class="rec-badge" style="display:none">✦ Neuer Rekord ✦</div>
    <div class="card-title gold">Bravo!</div>
    <div class="card-sub">Level bestanden</div>
    <div class="stat-row">
      <div class="stat"><div class="stat-lbl">Punkte</div><div class="stat-val" id="w-pts">0</div></div>
      <div class="stat"><div class="stat-lbl">Züge</div><div class="stat-val" id="w-mv">0</div></div>
      <div class="stat"><div class="stat-lbl">Zeit übrig</div><div class="stat-val" id="w-tm">0s</div></div>
      <div class="stat"><div class="stat-lbl">Noten</div><div class="stat-val" id="w-nt">0</div></div>
    </div>
    <button class="btn btn-gold" id="btn-next">Nächstes Level ♫</button>
    <button class="btn btn-line" id="btn-wmenu">← Menü</button>
  </div>
</div>

<!-- ═══ LOSE ═══ -->
<div id="s-lose" class="screen">
  <div class="card">
    <div class="card-icon">🎼</div>
    <div class="card-title silver">Game Over</div>
    <div class="card-sub">Ziel nicht erreicht</div>
    <div class="stat-row">
      <div class="stat"><div class="stat-lbl">Punkte</div><div class="stat-val" id="l-pts">0</div></div>
      <div class="stat"><div class="stat-lbl">Ziel war</div><div class="stat-val" id="l-tgt">0</div></div>
    </div>
    <button class="btn btn-gold" id="btn-retry">↺ Nochmal</button>
    <button class="btn btn-line" id="btn-lmenu">← Menü</button>
  </div>
</div>

<script>
'use strict';

// ════════════════════════════════════════════
//  MUSIC  — 6 clearly different cheerful themes
// ════════════════════════════════════════════
const Snd = (() => {
  let AC, master, muted = false, playing = false, tmr = null, lvl = 1, seq = 0, nextT = 0;

  const hz = (midi) => 440 * Math.pow(2, (midi - 69) / 12);

  function note(midi, t, dur, vol, wave) {
    if (!AC || muted || !midi) return;
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = wave || 'triangle';
    o.frequency.value = hz(midi);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol, t + 0.02);
    g.gain.exponentialRampToValueAtTime(vol * 0.25, t + dur * 0.4);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur * 0.9);
    o.connect(g); g.connect(master);
    o.start(t); o.stop(t + dur + 0.05);
  }

  // 6 themes — very distinct tempos, waveforms and melodies
  // [beatOffset, midiNote, duration_beats, volume]
  const THEMES = [
    // 1: Fröhlicher Walzer C-Dur ♩=120 — hüpfend & hell
    { bpm:120, beats:3, wave:'triangle', bars:[
      [[0,48,2.8,.09],[0,60,.75,.12],[1,64,.75,.11],[2,67,.75,.12]],
      [[0,43,2.8,.09],[0,55,.75,.11],[1,59,.75,.12],[2,62,.75,.11]],
      [[0,45,2.8,.09],[0,57,.75,.12],[1,60,.75,.11],[2,65,.75,.13]],
      [[0,43,2.8,.09],[0,55,.75,.11],[1,60,.75,.12],[2,64,.75,.14]],
    ]},
    // 2: Spieluhr G-Dur ♩=90 — zart & perlenartig
    { bpm:90, beats:4, wave:'sine', bars:[
      [[0,43,3.8,.08],[0,79,.5,.10],[.5,81,.5,.09],[1,79,.5,.10],[1.5,76,.5,.09],[2,74,.5,.10],[2.5,72,.5,.09],[3,74,1,.11]],
      [[0,38,3.8,.08],[0,74,.5,.09],[.5,76,.5,.10],[1,74,.5,.09],[1.5,72,.5,.10],[2,71,.5,.09],[2.5,69,.5,.10],[3,67,1,.11]],
      [[0,41,3.8,.08],[0,72,.5,.10],[.5,74,.5,.09],[1,76,.5,.10],[1.5,74,.5,.09],[2,72,.5,.10],[2.5,71,.5,.09],[3,72,1,.12]],
      [[0,43,3.8,.08],[0,67,.5,.09],[.5,69,.5,.10],[1,71,.5,.11],[1.5,72,.5,.12],[2,74,.5,.11],[2.5,76,.5,.12],[3,79,1,.13]],
    ]},
    // 3: Polka F-Dur ♩=150 — quirlig & tanzend
    { bpm:150, beats:4, wave:'triangle', bars:[
      [[0,41,1.8,.10],[2,48,1.8,.08],[0,65,.4,.13],[.5,67,.4,.12],[1,69,.4,.13],[1.5,65,.4,.12],[2,72,.4,.13],[2.5,69,.4,.12],[3,67,.4,.13],[3.5,65,.4,.12]],
      [[0,36,1.8,.10],[2,48,1.8,.08],[0,72,.4,.12],[.5,74,.4,.13],[1,72,.4,.12],[1.5,69,.4,.13],[2,67,.4,.12],[2.5,65,.4,.11],[3,67,.4,.12],[3.5,69,.4,.13]],
      [[0,43,1.8,.10],[2,47,1.8,.08],[0,69,.4,.13],[.5,71,.4,.12],[1,72,.4,.13],[1.5,74,.4,.12],[2,72,.4,.13],[2.5,71,.4,.12],[3,69,.4,.11],[3.5,67,.4,.12]],
      [[0,41,1.8,.10],[2,48,1.8,.08],[0,65,.4,.12],[.5,67,.4,.13],[1,69,.4,.14],[1.5,71,.4,.13],[2,72,.8,.14],[3,74,.8,.15]],
    ]},
    // 4: Marsch D-Dur ♩=130 — kräftig & feierlich
    { bpm:130, beats:4, wave:'triangle', bars:[
      [[0,38,1,.12],[1,38,1,.10],[2,38,1,.12],[3,38,1,.10],[0,74,.8,.14],[1,78,.8,.13],[2,81,.8,.14],[3,83,.8,.15]],
      [[0,33,1,.12],[1,33,1,.10],[2,45,1,.12],[3,45,1,.10],[0,81,.8,.14],[1,83,.8,.13],[2,81,.8,.12],[3,78,.8,.13]],
      [[0,38,1,.12],[1,38,1,.10],[2,38,1,.12],[3,38,1,.10],[0,78,.8,.13],[1,76,.8,.12],[2,74,.8,.13],[3,71,.8,.12]],
      [[0,33,1,.12],[1,45,1,.10],[2,33,1,.12],[3,45,1,.10],[0,71,.8,.12],[1,74,.8,.13],[2,78,.9,.14],[3,81,.9,.15]],
    ]},
    // 5: Tarantella A-Dur ♩=168 — sehr schnell & aufregend
    { bpm:168, beats:6, wave:'triangle', bars:[
      [[0,33,5.8,.10],[0,69,.4,.13],[.5,73,.4,.12],[1,76,.4,.13],[1.5,73,.4,.12],[2,76,.4,.13],[2.5,80,.4,.14],[3,76,.4,.13],[3.5,73,.4,.12],[4,69,.4,.13],[4.5,73,.4,.12],[5,76,.4,.13]],
      [[0,28,5.8,.10],[0,76,.4,.12],[.5,80,.4,.13],[1,84,.4,.14],[1.5,80,.4,.13],[2,76,.4,.12],[2.5,73,.4,.13],[3,76,.4,.12],[3.5,73,.4,.11],[4,69,.4,.12],[4.5,68,.4,.11],[5,69,.4,.12]],
    ]},
    // 6: Csárdás E-Dur ♩=180 — wild & festlich, sehr schnell
    { bpm:180, beats:4, wave:'triangle', bars:[
      [[0,28,1.8,.12],[2,35,1.8,.10],[0,76,.35,.14],[.25,80,.35,.13],[.5,83,.35,.14],[.75,87,.35,.15],[1,83,.35,.14],[1.25,80,.35,.13],[1.5,83,.35,.14],[1.75,87,.35,.15],[2,88,.35,.14],[2.25,87,.35,.15],[2.5,85,.35,.14],[2.75,83,.35,.13],[3,80,.35,.14],[3.25,83,.35,.13],[3.5,80,.35,.14],[3.75,76,.35,.13]],
      [[0,23,1.8,.12],[2,35,1.8,.10],[0,83,.35,.13],[.25,87,.35,.14],[.5,88,.35,.15],[.75,87,.35,.14],[1,85,.35,.13],[1.25,83,.35,.14],[1.5,80,.35,.13],[1.75,76,.35,.12],[2,80,.35,.13],[2.25,83,.35,.14],[2.5,87,.35,.15],[2.75,88,.35,.14],[3,87,.35,.13],[3.25,85,.35,.14],[3.5,83,.35,.15],[3.75,80,.9,.16]],
    ]},
  ];

  function schedBar() {
    if (!playing || !AC) return;
    const th = THEMES[(lvl - 1) % 6];
    const beatLen = 60 / th.bpm;
    const barLen  = beatLen * th.beats;
    const barData = th.bars[seq % th.bars.length];
    barData.forEach(([beat, midi, dur, vol]) => {
      note(midi, nextT + beat * beatLen, dur * beatLen, vol, th.wave);
    });
    nextT += barLen;
    seq++;
  }

  function loop() {
    if (!playing || !AC) return;
    const th = THEMES[(lvl - 1) % 6];
    const barLen = 60 / th.bpm * th.beats;
    while (nextT < AC.currentTime + barLen * 3) schedBar();
    tmr = setTimeout(loop, 300);
  }

  return {
    init() {
      if (AC) return;
      AC = new (window.AudioContext || window.webkitAudioContext)();
      master = AC.createGain(); master.gain.value = 0.7;
      master.connect(AC.destination);
    },
    play(level) {
      if (!AC) return;
      playing = false; clearTimeout(tmr);
      lvl = level; seq = 0;
      nextT = AC.currentTime + 0.1;
      playing = true; loop();
    },
    stop() { playing = false; clearTimeout(tmr); },
    mute() {
      muted = !muted;
      if (master) master.gain.value = muted ? 0 : 0.7;
      if (!muted && !playing) this.play(lvl);
      return muted;
    },
  };
})();

// ════════════════════════════════════════════
//  GAME LOGIC
// ════════════════════════════════════════════
const SYMS = ['♩','♪','♫','♬','♭','♯'];
const COLS = ['n0','n1','n2','n3','n4','n5'];

const LEVELS = [
  {id:1, size:6, types:6, target:5000,  moves:60, time:480},
  {id:2, size:7, types:6, target:10000, moves:55, time:420},
  {id:3, size:7, types:6, target:18000, moves:50, time:360},
  {id:4, size:8, types:6, target:30000, moves:45, time:300},
  {id:5, size:8, types:6, target:45000, moves:38, time:240},
  {id:6, size:8, types:6, target:65000, moves:30, time:180},
];

let G = null;      // game state
let selCell = null; // currently selected cell {r,c}
let busy = false;   // true while animation plays

// ── Helpers ──
const $ = id => document.getElementById(id);
const sleep = ms => new Promise(r => setTimeout(r, ms));
const rand = n => Math.floor(Math.random() * n);

function cellEl(r, c) {
  return document.querySelector(`#grid [data-r="${r}"][data-c="${c}"]`);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(id).classList.add('active');
}

// ── Grid generation — NO initial matches ──
function makeGrid(size, types) {
  const g = Array.from({length: size}, () => new Array(size).fill(0));
  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      let v, tries = 0;
      do {
        v = rand(types);
        tries++;
      } while (tries < 20 && (
        (c >= 2 && g[r][c-1] === v && g[r][c-2] === v) ||
        (r >= 2 && g[r-1][c] === v && g[r-2][c] === v)
      ));
      g[r][c] = v;
    }
  }
  return g;
}

// ── Match detection — only 3+ consecutive same values ──
function findMatches(g, size) {
  const hit = Array.from({length:size}, () => new Array(size).fill(false));
  // horizontal
  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size - 2; c++) {
      const v = g[r][c];
      if (v >= 0 && g[r][c+1] === v && g[r][c+2] === v) {
        let len = 3;
        while (c + len < size && g[r][c+len] === v) len++;
        for (let k = 0; k < len; k++) hit[r][c+k] = true;
      }
    }
  }
  // vertical
  for (let c = 0; c < size; c++) {
    for (let r = 0; r < size - 2; r++) {
      const v = g[r][c];
      if (v >= 0 && g[r+1][c] === v && g[r+2][c] === v) {
        let len = 3;
        while (r + len < size && g[r+len][c] === v) len++;
        for (let k = 0; k < len; k++) hit[r+k][c] = true;
      }
    }
  }
  const res = [];
  for (let r = 0; r < size; r++)
    for (let c = 0; c < size; c++)
      if (hit[r][c]) res.push({r,c});
  return res;
}

// ── Render ──
function buildGrid() {
  const el = $('grid');
  const {size} = G.cfg;
  el.style.gridTemplateColumns = `repeat(${size},1fr)`;
  el.innerHTML = '';
  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      const d = document.createElement('div');
      d.className = 'cell ' + COLS[G.grid[r][c]];
      d.dataset.r = r; d.dataset.c = c;
      d.textContent = SYMS[G.grid[r][c]];
      el.appendChild(d);
    }
  }
}

function redrawCell(r, c, anim) {
  const d = cellEl(r, c);
  if (!d) return;
  const v = G.grid[r][c];
  if (v < 0) { d.style.visibility = 'hidden'; return; }
  // Update in-place — no DOM removal, no flicker
  d.className = 'cell ' + COLS[v];
  d.textContent = SYMS[v];
  d.style.visibility = '';
  d.style.animation = 'none';          // reset old animation
  void d.offsetWidth;                   // reflow (single cell, not whole grid)
  d.style.animation = '';
  if (anim) d.classList.add(anim);
}

function updateHUD() {
  $('h-pts').textContent = G.pts;
  $('h-mv').textContent  = G.moves;
  const t = $('h-tm');
  t.textContent = G.time;
  t.className = 'hud-val' + (G.time <= 15 ? ' warn' : '');
  const pct = Math.min(100, Math.round(G.pts / G.cfg.target * 100));
  $('h-prog').style.width = pct + '%';
  $('h-pct').textContent = pct + '%';
}

// ── Clear a set of matched cells, apply gravity, cascade ──
async function doClear(matches) {
  // Animate matched cells away
  matches.forEach(({r,c}) => {
    const d = cellEl(r,c);
    if (d) d.classList.add('pop');
  });
  await sleep(370);

  // Remove from grid
  matches.forEach(({r,c}) => { G.grid[r][c] = -1; });
  G.notes += matches.length;
  G.pts   += matches.length * 30 + Math.max(0, matches.length - 3) * 15;

  // Gravity: drop tiles down
  for (let c = 0; c < G.cfg.size; c++) {
    let empty = G.cfg.size - 1;
    for (let r = G.cfg.size - 1; r >= 0; r--) {
      if (G.grid[r][c] >= 0) {
        G.grid[empty][c] = G.grid[r][c];
        if (empty !== r) G.grid[r][c] = -1;
        empty--;
      }
    }
    for (let r = empty; r >= 0; r--) G.grid[r][c] = rand(G.cfg.types);
  }

  // Redraw with drop animation
  for (let r = 0; r < G.cfg.size; r++)
    for (let c = 0; c < G.cfg.size; c++)
      redrawCell(r, c, 'drop');

  await sleep(300);

  // Auto-cascade: if new matches formed, clear them too
  const next = findMatches(G.grid, G.cfg.size);
  if (next.length > 0) {
    updateHUD();
    await doClear(next);
  }
}

// ── Input ──
function clearSel() {
  if (selCell) {
    const d = cellEl(selCell.r, selCell.c);
    if (d) d.classList.remove('sel');
    selCell = null;
  }
}

async function onTap(r, c) {
  if (busy || G.over) return;

  if (selCell === null) {
    // First tap — just select
    selCell = {r, c};
    cellEl(r, c).classList.add('sel');

  } else {
    const {r: r1, c: c1} = selCell;
    clearSel();

    if (r1 === r && c1 === c) return; // same cell → deselect

    const adjacent = Math.abs(r1 - r) + Math.abs(c1 - c) === 1;

    if (!adjacent) {
      // Select the new cell instead
      selCell = {r, c};
      cellEl(r, c).classList.add('sel');
      return;
    }

    // ── Swap the two adjacent cells ──
    busy = true;
    [G.grid[r1][c1], G.grid[r][c]] = [G.grid[r][c], G.grid[r1][c1]];
    redrawCell(r1, c1);
    redrawCell(r, c);

    const matches = findMatches(G.grid, G.cfg.size);

    if (matches.length === 0) {
      // No match → swap back + shake
      await sleep(180);
      [G.grid[r1][c1], G.grid[r][c]] = [G.grid[r][c], G.grid[r1][c1]];
      redrawCell(r1, c1);
      redrawCell(r, c);
      [cellEl(r1,c1), cellEl(r,c)].forEach(d => {
        if (!d) return;
        d.classList.add('shake');
        setTimeout(() => d.classList.remove('shake'), 300);
      });
    } else {
      // Valid match → clear + cascade
      G.moves--;
      await doClear(matches);
      updateHUD();
      checkEnd();
    }
    busy = false;
  }
}

function checkEnd() {
  if (G.pts >= G.cfg.target) {
    G.over = true;
    clearInterval(G.timer);
    setTimeout(showWin, 400);
  } else if (G.moves <= 0 || G.time <= 0) {
    G.over = true;
    clearInterval(G.timer);
    setTimeout(showLose, 400);
  }
}

function showWin() {
  $('w-pts').textContent = G.pts;
  $('w-mv').textContent  = G.cfg.moves - G.moves;
  $('w-tm').textContent  = G.time + 's';
  $('w-nt').textContent  = G.notes;
  const hs = +localStorage.getItem('mm_hs') || 0;
  $('rec').style.display = G.pts > hs ? '' : 'none';
  if (G.pts > hs) localStorage.setItem('mm_hs', G.pts);
  showScreen('s-win');
}

function showLose() {
  $('l-pts').textContent = G.pts;
  $('l-tgt').textContent = G.cfg.target;
  showScreen('s-lose');
}

function startLevel(id) {
  const cfg = LEVELS.find(l => l.id === id) || LEVELS[0];
  G = { cfg, grid: makeGrid(cfg.size, cfg.types),
        pts: 0, moves: cfg.moves, time: cfg.time,
        notes: 0, over: false, timer: null };
  selCell = null; busy = false;

  $('h-lvl').textContent = cfg.id;
  $('h-tgt').textContent = cfg.target;
  updateHUD();
  buildGrid();
  Snd.play(cfg.id);

  G.timer = setInterval(() => {
    if (G.over) return;
    G.time--;
    updateHUD();
    if (G.time <= 0) checkEnd();
  }, 1000);

  showScreen('s-game');
}

// ── Event listeners ──
document.addEventListener('DOMContentLoaded', () => {
  // Start audio on first touch/click
  const startAudio = () => { Snd.init(); Snd.play(1); };
  document.addEventListener('pointerdown', startAudio, {once: true});

  $('hs').textContent = localStorage.getItem('mm_hs') || '0';

  // Level select
  let chosen = 1;
  document.getElementById('s-start').addEventListener('click', e => {
    const b = e.target.closest('.lvl-btn');
    if (!b) return;
    document.querySelectorAll('.lvl-btn').forEach(x => x.classList.remove('sel'));
    b.classList.add('sel');
    chosen = +b.dataset.l;
  });

  $('btn-play').addEventListener('click', () => startLevel(chosen));

  $('btn-help').addEventListener('click', () =>
    alert(
      '🎵 So spielst du MelodyMatch:\n\n' +
      '1. Tippe eine Note an — sie leuchtet gold auf.\n' +
      '2. Tippe eine direkt danebenliegende (!) Note an — die beiden tauschen die Plätze.\n' +
      '3. Wenn durch den Tausch 3 oder mehr gleiche Noten in einer REIHE oder SPALTE entstehen → verschwinden sie automatisch!\n' +
      '4. Neue Noten fallen von oben nach.\n' +
      '5. Sammle genug Punkte vor Ablauf der Zeit!'
    )
  );

  $('mute').addEventListener('click', () => {
    const m = Snd.mute();
    $('mute').textContent = m ? '🔇' : '♪';
    $('mute').style.opacity = m ? '.4' : '1';
  });

  // Tipp-Button
  $('btn-hint').addEventListener('click', () => {
    if (busy || !G || G.over) return;
    const size = G.cfg.size;
    for (let r = 0; r < size; r++) {
      for (let c = 0; c < size; c++) {
        for (const [dr,dc] of [[0,1],[1,0]]) {
          const r2=r+dr, c2=c+dc;
          if (r2>=size||c2>=size) continue;
          [G.grid[r][c],G.grid[r2][c2]]=[G.grid[r2][c2],G.grid[r][c]];
          const ok = findMatches(G.grid, size).length > 0;
          [G.grid[r][c],G.grid[r2][c2]]=[G.grid[r2][c2],G.grid[r][c]];
          if (ok) {
            [cellEl(r,c),cellEl(r2,c2)].forEach(d => {
              if (!d) return;
              d.style.boxShadow = '0 0 0 3px #e8c97a,0 0 14px #e8c97a';
              setTimeout(() => d.style.boxShadow='', 1800);
            });
            return;
          }
        }
      }
    }
  });

  $('btn-menu').addEventListener('click', () => {
    if (G) { clearInterval(G.timer); G.over = true; }
    clearSel(); busy = false;
    $('hs').textContent = localStorage.getItem('mm_hs') || '0';
    showScreen('s-start');
  });

  // Win screen
  $('btn-next').addEventListener('click', () => {
    const next = Math.min(G.cfg.id + 1, 6);
    document.querySelectorAll('.lvl-btn').forEach(b => b.classList.toggle('sel', +b.dataset.l === next));
    startLevel(next);
  });
  $('btn-wmenu').addEventListener('click', () => {
    $('hs').textContent = localStorage.getItem('mm_hs') || '0';
    showScreen('s-start');
  });

  // Lose screen
  $('btn-retry').addEventListener('click',  () => startLevel(G.cfg.id));
  $('btn-lmenu').addEventListener('click',  () => {
    $('hs').textContent = localStorage.getItem('mm_hs') || '0';
    showScreen('s-start');
  });

  // Grid input — one pointerdown per cell
  $('grid').addEventListener('pointerdown', e => {
    const cell = e.target.closest('.cell');
    if (!cell) return;
    e.preventDefault();
    onTap(+cell.dataset.r, +cell.dataset.c);
  });
});
</script>
</body>
