<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MelodyMatch - Das Musiknoten-Spiel</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Lato:wght@300;400;700&display=swap');

  :root {
    --bg: #0d0d1a;
    --panel: #16162a;
    --accent: #c9a96e;
    --glow: #e8c97a;
    --text: #f0e6d3;
    --shadow: rgba(0,0,0,0.6);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Lato', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Animated starfield background */
  #bg-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  /* Floating music notes decoration */
  .float-note {
    position: fixed;
    font-size: 2rem;
    opacity: 0;
    pointer-events: none;
    z-index: 1;
    animation: floatUp 6s ease-in infinite;
  }

  @keyframes floatUp {
    0%   { opacity: 0; transform: translateY(0) rotate(0deg); }
    10%  { opacity: 0.3; }
    90%  { opacity: 0.1; }
    100% { opacity: 0; transform: translateY(-100vh) rotate(30deg); }
  }

  /* ── SCREENS ── */
  .screen {
    position: relative;
    z-index: 10;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }
  .screen.active { display: flex; }

  /* ── START SCREEN ── */
  #start-screen {
    background: linear-gradient(135deg, rgba(13,13,26,0.95) 0%, rgba(22,22,42,0.95) 100%);
  }

  .logo {
    text-align: center;
    margin-bottom: 40px;
  }
  .logo-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.5rem, 8vw, 5rem);
    font-weight: 900;
    background: linear-gradient(135deg, #c9a96e, #e8c97a, #fff8e7, #c9a96e);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 3s ease-in-out infinite;
    letter-spacing: 3px;
    text-shadow: none;
    filter: drop-shadow(0 0 20px rgba(201,169,110,0.4));
  }
  @keyframes shimmer {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  .logo-subtitle {
    font-size: 1.1rem;
    color: rgba(240,230,211,0.6);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-top: 8px;
    font-weight: 300;
  }

  .big-notes {
    font-size: 4rem;
    margin: 10px 0;
    animation: pulse-notes 2s ease-in-out infinite;
  }
  @keyframes pulse-notes {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }

  .start-panel {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(201,169,110,0.3);
    border-radius: 20px;
    padding: 40px;
    width: 100%;
    max-width: 420px;
    backdrop-filter: blur(10px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
  }

  .highscore-display {
    text-align: center;
    margin-bottom: 30px;
    padding: 15px;
    background: rgba(201,169,110,0.1);
    border-radius: 10px;
    border: 1px solid rgba(201,169,110,0.2);
  }
  .highscore-display .hs-label {
    font-size: 0.75rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    opacity: 0.8;
  }
  .highscore-display .hs-value {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: var(--glow);
    font-weight: 700;
  }

  .btn {
    display: block;
    width: 100%;
    padding: 16px 24px;
    border: none;
    border-radius: 12px;
    font-family: 'Lato', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s ease;
    margin-bottom: 12px;
    position: relative;
    overflow: hidden;
  }
  .btn::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 0; height: 0;
    background: rgba(255,255,255,0.15);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    transition: width 0.4s, height 0.4s;
  }
  .btn:active::after { width: 300px; height: 300px; }

  .btn-primary {
    background: linear-gradient(135deg, #c9a96e, #e8c97a);
    color: #1a1200;
    box-shadow: 0 4px 20px rgba(201,169,110,0.4);
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(201,169,110,0.6);
  }
  .btn-secondary {
    background: transparent;
    color: var(--accent);
    border: 1px solid rgba(201,169,110,0.4);
  }
  .btn-secondary:hover {
    background: rgba(201,169,110,0.1);
    border-color: var(--accent);
  }

  .level-select {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  .level-btn {
    padding: 12px 8px;
    border: 1px solid rgba(201,169,110,0.3);
    border-radius: 10px;
    background: rgba(255,255,255,0.03);
    color: var(--text);
    font-family: 'Lato', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .level-btn:hover, .level-btn.selected {
    background: rgba(201,169,110,0.15);
    border-color: var(--accent);
    color: var(--glow);
    transform: scale(1.05);
  }
  .level-btn .lvl-num {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 700;
    display: block;
  }
  .level-btn .lvl-name {
    font-size: 0.7rem;
    opacity: 0.7;
    letter-spacing: 1px;
  }

  /* ── GAME SCREEN ── */
  #game-screen {
    padding: 10px;
    gap: 10px;
  }

  .game-header {
    width: 100%;
    max-width: 520px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(201,169,110,0.2);
    border-radius: 14px;
    backdrop-filter: blur(8px);
  }

  .stat-box {
    text-align: center;
    min-width: 80px;
  }
  .stat-label {
    font-size: 0.65rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    opacity: 0.7;
  }
  .stat-value {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    color: var(--glow);
    font-weight: 700;
    line-height: 1.2;
  }

  .level-badge {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .level-badge .lvl-label {
    font-size: 0.6rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    opacity: 0.7;
  }
  .level-badge .lvl-val {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    font-weight: 900;
    color: var(--glow);
    line-height: 1;
  }

  /* Progress bar */
  .progress-wrap {
    width: 100%;
    max-width: 520px;
    padding: 0 4px;
  }
  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 0.7rem;
    color: rgba(240,230,211,0.5);
    margin-bottom: 4px;
    letter-spacing: 1px;
  }
  .progress-bar {
    height: 6px;
    background: rgba(255,255,255,0.08);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #c9a96e, #e8c97a);
    border-radius: 3px;
    transition: width 0.4s ease;
    box-shadow: 0 0 8px rgba(201,169,110,0.5);
  }

  /* Grid */
  #grid-container {
    position: relative;
  }
  #game-grid {
    display: grid;
    gap: 6px;
    padding: 14px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(201,169,110,0.2);
    border-radius: 18px;
    backdrop-filter: blur(8px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
  }

  .cell {
    width: 60px;
    height: 60px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
    position: relative;
    user-select: none;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .cell:hover {
    transform: scale(1.08);
    z-index: 2;
  }
  .cell.selected {
    transform: scale(1.12);
    z-index: 3;
    box-shadow: 0 0 0 3px var(--glow), 0 0 20px rgba(232,201,122,0.5);
  }
  .cell.matched {
    animation: match-burst 0.4s ease forwards;
  }
  @keyframes match-burst {
    0%   { transform: scale(1.2); opacity: 1; filter: brightness(2); }
    50%  { transform: scale(1.5); opacity: 0.7; filter: brightness(3) blur(2px); }
    100% { transform: scale(0); opacity: 0; }
  }
  .cell.falling {
    animation: fall-in 0.3s cubic-bezier(.34,1.56,.64,1) forwards;
  }
  @keyframes fall-in {
    0%   { transform: translateY(-80px) scale(0.7); opacity: 0; }
    100% { transform: translateY(0) scale(1); opacity: 1; }
  }
  .cell.hint { animation: hint-pulse 0.6s ease 3; }
  @keyframes hint-pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); filter: brightness(1.5); }
  }

  /* Note types */
  .note-0 { background: linear-gradient(135deg, #1a3a6b, #2a5ba8); box-shadow: 0 4px 12px rgba(26,58,107,0.5); }
  .note-1 { background: linear-gradient(135deg, #4a1a6b, #7a2aa8); box-shadow: 0 4px 12px rgba(74,26,107,0.5); }
  .note-2 { background: linear-gradient(135deg, #1a5a2a, #2a8a3a); box-shadow: 0 4px 12px rgba(26,90,42,0.5); }
  .note-3 { background: linear-gradient(135deg, #6b3a1a, #a85a2a); box-shadow: 0 4px 12px rgba(107,58,26,0.5); }
  .note-4 { background: linear-gradient(135deg, #5a1a1a, #a82a2a); box-shadow: 0 4px 12px rgba(90,26,26,0.5); }
  .note-5 { background: linear-gradient(135deg, #1a5a5a, #2a8a8a); box-shadow: 0 4px 12px rgba(26,90,90,0.5); }

  /* Score popup */
  .score-popup {
    position: absolute;
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--glow);
    pointer-events: none;
    z-index: 100;
    text-shadow: 0 0 10px rgba(232,201,122,0.8);
    animation: score-fly 1s ease forwards;
  }
  @keyframes score-fly {
    0%   { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-60px) scale(1.3); }
  }

  /* Game footer */
  .game-footer {
    display: flex;
    gap: 10px;
    width: 100%;
    max-width: 520px;
  }
  .btn-sm {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    font-size: 0.8rem;
  }

  /* ── LEVEL COMPLETE / GAME OVER SCREENS ── */
  #complete-screen, #gameover-screen {
    background: rgba(13,13,26,0.97);
  }
  .result-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(201,169,110,0.3);
    border-radius: 24px;
    padding: 50px 40px;
    width: 100%;
    max-width: 400px;
    text-align: center;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
  }
  .result-icon { font-size: 5rem; margin-bottom: 20px; }
  .result-title {
    font-family: 'Playfair Display', serif;
    font-size: 2.5rem;
    font-weight: 900;
    margin-bottom: 8px;
  }
  .result-title.gold { color: var(--glow); }
  .result-title.silver { color: #a8b8c8; }
  .result-subtitle {
    font-size: 0.9rem;
    opacity: 0.6;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 30px;
  }
  .result-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 30px;
  }
  .result-stat {
    background: rgba(255,255,255,0.04);
    border-radius: 12px;
    padding: 14px;
    border: 1px solid rgba(201,169,110,0.15);
  }
  .result-stat .rs-label {
    font-size: 0.65rem;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
    opacity: 0.7;
  }
  .result-stat .rs-value {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    color: var(--glow);
    font-weight: 700;
  }
  .stars {
    font-size: 2.5rem;
    margin-bottom: 20px;
    letter-spacing: 6px;
  }
  .new-record-badge {
    display: inline-block;
    background: linear-gradient(135deg, #c9a96e, #e8c97a);
    color: #1a1200;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 14px;
    border-radius: 20px;
    margin-bottom: 16px;
    animation: badge-glow 1s ease-in-out infinite alternate;
  }
  @keyframes badge-glow {
    from { box-shadow: 0 0 8px rgba(201,169,110,0.4); }
    to { box-shadow: 0 0 20px rgba(201,169,110,0.8); }
  }

  /* Music toggle */
  #music-toggle {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 100;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(201,169,110,0.3);
    color: var(--accent);
    font-size: 1.3rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(8px);
  }
  #music-toggle:hover { background: rgba(201,169,110,0.15); }
  #music-toggle.muted { opacity: 0.4; }

  /* Combo indicator */
  .combo-badge {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Playfair Display', serif;
    font-size: 3rem;
    font-weight: 900;
    color: var(--glow);
    text-shadow: 0 0 30px rgba(232,201,122,0.8);
    pointer-events: none;
    z-index: 200;
    animation: combo-anim 0.8s ease forwards;
  }
  @keyframes combo-anim {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
    30%  { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
    70%  { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -60%) scale(0.8); }
  }

  /* Timer warning */
  .stat-value.warning { color: #ff6b6b; animation: blink 0.5s ease infinite; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* Responsive */
  @media (max-width: 400px) {
    .cell { width: 48px; height: 48px; font-size: 1.4rem; border-radius: 9px; }
    #game-grid { gap: 4px; padding: 10px; }
  }
  @media (min-width: 600px) {
    .cell { width: 68px; height: 68px; font-size: 2rem; }
  }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<button id="music-toggle" title="Musik an/aus">♪</button>

<!-- ══════════════════ START SCREEN ══════════════════ -->
<div id="start-screen" class="screen active">
  <div class="logo">
    <div class="big-notes">♩ ♪ ♫ ♬</div>
    <div class="logo-title">MelodyMatch</div>
    <div class="logo-subtitle">Das Musiknoten-Spiel</div>
  </div>

  <div class="start-panel">
    <div class="highscore-display">
      <div class="hs-label">🏆 Highscore</div>
      <div class="hs-value" id="hs-display">0</div>
    </div>

    <div class="level-select" id="level-select">
      <button class="level-btn selected" data-level="1">
        <span class="lvl-num">1</span>
        <span class="lvl-name">Adagio</span>
      </button>
      <button class="level-btn" data-level="2">
        <span class="lvl-num">2</span>
        <span class="lvl-name">Andante</span>
      </button>
      <button class="level-btn" data-level="3">
        <span class="lvl-num">3</span>
        <span class="lvl-name">Moderato</span>
      </button>
      <button class="level-btn" data-level="4">
        <span class="lvl-num">4</span>
        <span class="lvl-name">Allegro</span>
      </button>
      <button class="level-btn" data-level="5">
        <span class="lvl-num">5</span>
        <span class="lvl-name">Vivace</span>
      </button>
      <button class="level-btn" data-level="6">
        <span class="lvl-num">6</span>
        <span class="lvl-name">Presto</span>
      </button>
    </div>

    <button class="btn btn-primary" id="start-btn">♫ Spielen</button>
    <button class="btn btn-secondary" id="how-to-btn">Wie spielt man?</button>
  </div>
</div>

<!-- ══════════════════ GAME SCREEN ══════════════════ -->
<div id="game-screen" class="screen">
  <div class="game-header">
    <div class="stat-box">
      <div class="stat-label">Punkte</div>
      <div class="stat-value" id="score-display">0</div>
    </div>
    <div class="level-badge">
      <span class="lvl-label">Level</span>
      <span class="lvl-val" id="level-display">1</span>
    </div>
    <div class="stat-box">
      <div class="stat-label">Zeit</div>
      <div class="stat-value" id="timer-display">60</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Moves</div>
      <div class="stat-value" id="moves-display">30</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-info">
      <span>Ziel: <span id="target-display">500</span> Punkte</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>

  <div id="grid-container">
    <div id="game-grid"></div>
  </div>

  <div class="game-footer">
    <button class="btn btn-secondary btn-sm" id="hint-btn">💡 Tipp</button>
    <button class="btn btn-secondary btn-sm" id="shuffle-btn">🔀 Mischen</button>
    <button class="btn btn-secondary btn-sm" id="menu-btn">← Menü</button>
  </div>
</div>

<!-- ══════════════════ LEVEL COMPLETE ══════════════════ -->
<div id="complete-screen" class="screen">
  <div class="result-card">
    <div class="result-icon">🎵</div>
    <div id="new-record-div" style="display:none"><span class="new-record-badge">✦ Neuer Rekord ✦</span></div>
    <div class="result-title gold">Bravo!</div>
    <div class="result-subtitle">Level bestanden</div>
    <div class="stars" id="stars-display">⭐⭐⭐</div>
    <div class="result-stats">
      <div class="result-stat">
        <div class="rs-label">Punkte</div>
        <div class="rs-value" id="fin-score">0</div>
      </div>
      <div class="result-stat">
        <div class="rs-label">Züge</div>
        <div class="rs-value" id="fin-moves">0</div>
      </div>
      <div class="result-stat">
        <div class="rs-label">Zeit übrig</div>
        <div class="rs-value" id="fin-time">0s</div>
      </div>
      <div class="result-stat">
        <div class="rs-label">Combo</div>
        <div class="rs-value" id="fin-combo">0</div>
      </div>
    </div>
    <button class="btn btn-primary" id="next-level-btn">Nächstes Level ♫</button>
    <button class="btn btn-secondary" id="complete-menu-btn">← Menü</button>
  </div>
</div>

<!-- ══════════════════ GAME OVER ══════════════════ -->
<div id="gameover-screen" class="screen">
  <div class="result-card">
    <div class="result-icon">🎼</div>
    <div class="result-title silver">Game Over</div>
    <div class="result-subtitle">Ziel nicht erreicht</div>
    <div class="result-stats">
      <div class="result-stat">
        <div class="rs-label">Punkte</div>
        <div class="rs-value" id="go-score">0</div>
      </div>
      <div class="result-stat">
        <div class="rs-label">Ziel war</div>
        <div class="rs-value" id="go-target">0</div>
      </div>
    </div>
    <button class="btn btn-primary" id="retry-btn">↺ Nochmal</button>
    <button class="btn btn-secondary" id="gameover-menu-btn">← Menü</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
//  AUDIO ENGINE
// ═══════════════════════════════════════════════════
const Audio = (() => {
  let ctx = null;
  let masterGain = null;
  let musicGain = null;
  let sfxGain = null;
  let bgNodes = [];
  let muted = false;
  let musicPlaying = false;
  let scheduleTimer = null;

  // Piano note frequencies (C4 = 261.63 Hz)
  const NOTES = {
    C3:130.81, D3:146.83, E3:164.81, F3:174.61, G3:196.00, A3:220.00, B3:246.94,
    C4:261.63, D4:293.66, E4:329.63, F4:349.23, G4:392.00, A4:440.00, B4:493.88,
    C5:523.25, D5:587.33, E5:659.25, G5:783.99, A5:880.00
  };

  function init() {
    if (ctx) return;
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = ctx.createGain(); masterGain.gain.value = 0.85;
    musicGain  = ctx.createGain(); musicGain.gain.value  = 0.35;
    sfxGain    = ctx.createGain(); sfxGain.gain.value    = 0.7;
    musicGain.connect(masterGain);
    sfxGain.connect(masterGain);
    masterGain.connect(ctx.destination);
  }

  // Soft piano-like tone using oscillators + envelope
  function playTone(freq, startTime, duration, type='sine', vol=0.5, dest=null) {
    if (!ctx) return null;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    const filter = ctx.createBiquadFilter();

    osc.type = type;
    osc.frequency.setValueAtTime(freq, startTime);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.998, startTime + duration);

    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(2000, startTime);
    filter.frequency.exponentialRampToValueAtTime(800, startTime + duration * 0.7);

    // ADSR envelope
    gain.gain.setValueAtTime(0, startTime);
    gain.gain.linearRampToValueAtTime(vol, startTime + 0.012);
    gain.gain.exponentialRampToValueAtTime(vol * 0.6, startTime + 0.08);
    gain.gain.exponentialRampToValueAtTime(vol * 0.4, startTime + duration * 0.5);
    gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);

    osc.connect(filter);
    filter.connect(gain);
    gain.connect(dest || sfxGain);
    osc.start(startTime);
    osc.stop(startTime + duration + 0.05);
    return osc;
  }

  // Accordion-like chord: sine + slight detuned saw
  function playChord(freqs, startTime, duration, vol=0.18) {
    freqs.forEach(f => {
      playTone(f, startTime, duration, 'sine', vol, musicGain);
      playTone(f * 1.002, startTime, duration, 'triangle', vol * 0.3, musicGain);
    });
  }

  // Background music: calming piano waltz progression
  // Chords: Am - F - C - G (loop)
  const PROGRESSION = [
    // Am chord  (A3 C4 E4)
    [NOTES.A3, NOTES.C4, NOTES.E4],
    // F chord   (F3 A3 C4)
    [NOTES.F3, NOTES.A3, NOTES.C4],
    // C chord   (C3 E3 G3)
    [NOTES.C3, NOTES.E3, NOTES.G3],
    // G chord   (G3 B3 D4)
    [NOTES.G3, NOTES.B3, NOTES.D4],
  ];

  // Melody notes over the chords
  const MELODY = [
    [NOTES.A4, NOTES.E4, NOTES.C5, NOTES.A4],
    [NOTES.F4, NOTES.A4, NOTES.C5, NOTES.A4],
    [NOTES.E4, NOTES.G4, NOTES.C5, NOTES.E4],
    [NOTES.G4, NOTES.D5, NOTES.B4, NOTES.G4],
  ];

  const BAR = 2.2; // seconds per bar
  let nextBarTime = 0;
  let barIndex = 0;

  function scheduleBar() {
    if (!ctx || muted || !musicPlaying) return;
    const t = nextBarTime;

    // Chord pad
    playChord(PROGRESSION[barIndex % 4], t, BAR * 0.95, 0.15);

    // Bass note
    playTone(PROGRESSION[barIndex % 4][0] / 2, t, BAR * 0.9, 'sine', 0.12, musicGain);

    // Melody arpeggios
    const mel = MELODY[barIndex % 4];
    mel.forEach((f, i) => {
      const noteDur = BAR / mel.length;
      playTone(f, t + i * noteDur, noteDur * 0.85, 'sine', 0.10, musicGain);
      // Harmonics for piano colour
      playTone(f * 2, t + i * noteDur, noteDur * 0.5, 'sine', 0.03, musicGain);
    });

    nextBarTime += BAR;
    barIndex++;
  }

  function schedulerLoop() {
    if (!musicPlaying) return;
    while (nextBarTime < ctx.currentTime + BAR * 2) scheduleBar();
    scheduleTimer = setTimeout(schedulerLoop, 200);
  }

  function startMusic() {
    if (!ctx || musicPlaying) return;
    musicPlaying = true;
    nextBarTime = ctx.currentTime + 0.1;
    barIndex = 0;
    schedulerLoop();
  }

  function stopMusic() {
    musicPlaying = false;
    clearTimeout(scheduleTimer);
  }

  // SFX
  const SFX = {
    select() {
      if (!ctx || muted) return;
      playTone(NOTES.E5, ctx.currentTime, 0.12, 'sine', 0.3);
    },
    match(count) {
      if (!ctx || muted) return;
      const t = ctx.currentTime;
      const freqs = [NOTES.C5, NOTES.E5, NOTES.G5, NOTES.A5];
      for (let i = 0; i < Math.min(count, 4); i++) {
        playTone(freqs[i], t + i * 0.06, 0.25, 'sine', 0.35);
      }
    },
    combo(n) {
      if (!ctx || muted) return;
      const t = ctx.currentTime;
      const scale = [NOTES.C5, NOTES.E5, NOTES.G5, NOTES.C5*2];
      scale.forEach((f, i) => playTone(f * (1 + n*0.1), t + i*0.08, 0.2, 'sine', 0.4));
    },
    levelUp() {
      if (!ctx || muted) return;
      const t = ctx.currentTime;
      [NOTES.C4, NOTES.E4, NOTES.G4, NOTES.C5].forEach((f,i) =>
        playTone(f, t + i*0.12, 0.4, 'sine', 0.4)
      );
    },
    gameOver() {
      if (!ctx || muted) return;
      const t = ctx.currentTime;
      [NOTES.G3, NOTES.E3, NOTES.C3].forEach((f,i) =>
        playTone(f, t + i*0.18, 0.5, 'sine', 0.3)
      );
    },
    shuffle() {
      if (!ctx || muted) return;
      const t = ctx.currentTime;
      for (let i = 0; i < 8; i++) {
        const f = 200 + Math.random() * 600;
        playTone(f, t + i*0.04, 0.08, 'sine', 0.15);
      }
    }
  };

  return {
    init,
    startMusic,
    stopMusic,
    SFX,
    toggleMute() {
      muted = !muted;
      if (masterGain) masterGain.gain.value = muted ? 0 : 0.85;
      if (!muted && !musicPlaying) startMusic();
      return muted;
    },
    get muted() { return muted; }
  };
})();

//  BACKGROUND CANVAS (stars)
// ═══════════════════════════════════════════════════
(function() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let stars = [];
  let W, H;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    stars = Array.from({length: 120}, () => ({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.5 + 0.3,
      speed: Math.random() * 0.3 + 0.05,
      phase: Math.random() * Math.PI * 2
    }));
  }

  function draw(t) {
    ctx.clearRect(0, 0, W, H);
    stars.forEach(s => {
      const alpha = 0.2 + 0.3 * Math.sin(t / 2000 + s.phase);
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,248,230,${alpha})`;
      ctx.fill();
      s.y -= s.speed;
      if (s.y < 0) { s.y = H; s.x = Math.random() * W; }
    });
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  resize();
  requestAnimationFrame(draw);
})();

// ═══════════════════════════════════════════════════
//  GAME ENGINE
// ═══════════════════════════════════════════════════
const Game = (() => {
  // Note types: symbol + CSS class
  const NOTE_TYPES = [
    { sym: '♩', cls: 'note-0' },
    { sym: '♪', cls: 'note-1' },
    { sym: '♫', cls: 'note-2' },
    { sym: '♬', cls: 'note-3' },
    { sym: '♭', cls: 'note-4' },
    { sym: '♯', cls: 'note-5' },
  ];

  // Level configs
  const LEVELS = [
    { id:1, name:'Adagio',   gridSize:6, noteTypes:4, target:500,  moves:30, time:90  },
    { id:2, name:'Andante',  gridSize:7, noteTypes:4, target:1200, moves:28, time:80  },
    { id:3, name:'Moderato', gridSize:7, noteTypes:5, target:2500, moves:26, time:70  },
    { id:4, name:'Allegro',  gridSize:8, noteTypes:5, target:4000, moves:25, time:60  },
    { id:5, name:'Vivace',   gridSize:8, noteTypes:6, target:6000, moves:22, time:50  },
    { id:6, name:'Presto',   gridSize:8, noteTypes:6, target:9000, moves:20, time:40  },
  ];

  let state = {};

  function levelCfg(id) {
    return LEVELS.find(l => l.id === id) || LEVELS[0];
  }

  function randomNote(numTypes) {
    return Math.floor(Math.random() * numTypes);
  }

  function initGrid(size, numTypes) {
    let grid;
    do {
      grid = [];
      for (let r = 0; r < size; r++) {
        grid[r] = [];
        for (let c = 0; c < size; c++) {
          grid[r][c] = randomNote(numTypes);
        }
      }
    } while (findMatches(grid, size).length === 0 || !hasValidMove(grid, size, numTypes));
    return grid;
  }

  function findMatches(grid, size) {
    const matched = new Set();
    // Horizontal
    for (let r = 0; r < size; r++) {
      let run = 1;
      for (let c = 1; c <= size; c++) {
        if (c < size && grid[r][c] === grid[r][c-1]) {
          run++;
        } else {
          if (run >= 3) {
            for (let k = c - run; k < c; k++) matched.add(`${r},${k}`);
          }
          run = 1;
        }
      }
    }
    // Vertical
    for (let c = 0; c < size; c++) {
      let run = 1;
      for (let r = 1; r <= size; r++) {
        if (r < size && grid[r][c] === grid[r-1][c]) {
          run++;
        } else {
          if (run >= 3) {
            for (let k = r - run; k < r; k++) matched.add(`${k},${c}`);
          }
          run = 1;
        }
      }
    }
    return [...matched].map(s => { const [r,c] = s.split(','); return {r:+r,c:+c}; });
  }

  function hasValidMove(grid, size, numTypes) {
    const dirs = [{dr:0,dc:1},{dr:1,dc:0}];
    for (let r = 0; r < size; r++) {
      for (let c = 0; c < size; c++) {
        for (const {dr,dc} of dirs) {
          const r2 = r+dr, c2 = c+dc;
          if (r2 >= size || c2 >= size) continue;
          // Try swap
          [grid[r][c], grid[r2][c2]] = [grid[r2][c2], grid[r][c]];
          const matches = findMatches(grid, size);
          [grid[r][c], grid[r2][c2]] = [grid[r2][c2], grid[r][c]];
          if (matches.length > 0) return true;
        }
      }
    }
    return false;
  }

  function findHint(grid, size) {
    const dirs = [{dr:0,dc:1},{dr:1,dc:0}];
    for (let r = 0; r < size; r++) {
      for (let c = 0; c < size; c++) {
        for (const {dr,dc} of dirs) {
          const r2 = r+dr, c2 = c+dc;
          if (r2 >= size || c2 >= size) continue;
          [grid[r][c], grid[r2][c2]] = [grid[r2][c2], grid[r][c]];
          const matches = findMatches(grid, size);
          [grid[r][c], grid[r2][c2]] = [grid[r2][c2], grid[r][c]];
          if (matches.length > 0) return [{r,c},{r:r2,c:c2}];
        }
      }
    }
    return null;
  }

  // DOM helpers
  function cellEl(r, c) {
    return document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
  }

  function renderCell(r, c, animate=false) {
    const el = cellEl(r, c);
    if (!el) return;
    const t = state.grid[r][c];
    const nt = NOTE_TYPES[t];
    el.className = `cell ${nt.cls}${animate ? ' falling' : ''}`;
    el.textContent = nt.sym;
  }

  function buildGrid() {
    const cfg = state.cfg;
    const grid = document.getElementById('game-grid');
    grid.style.gridTemplateColumns = `repeat(${cfg.gridSize}, 1fr)`;
    grid.innerHTML = '';
    for (let r = 0; r < cfg.gridSize; r++) {
      for (let c = 0; c < cfg.gridSize; c++) {
        const el = document.createElement('div');
        el.className = 'cell ' + NOTE_TYPES[state.grid[r][c]].cls;
        el.dataset.r = r;
        el.dataset.c = c;
        el.textContent = NOTE_TYPES[state.grid[r][c]].sym;
        el.addEventListener('click', () => onCellClick(r, c));
        grid.appendChild(el);
      }
    }
  }

  function updateHUD() {
    document.getElementById('score-display').textContent = state.score;
    document.getElementById('moves-display').textContent = state.movesLeft;
    const tEl = document.getElementById('timer-display');
    tEl.textContent = state.timeLeft;
    tEl.className = 'stat-value' + (state.timeLeft <= 10 ? ' warning' : '');
    const pct = Math.min(100, Math.round(state.score / state.cfg.target * 100));
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-pct').textContent = pct + '%';
  }

  let selected = null;
  let busy = false;

  function onCellClick(r, c) {
    if (busy || state.gameOver) return;
    Audio.SFX.select();

    if (selected === null) {
      selected = {r, c};
      cellEl(r, c).classList.add('selected');
    } else {
      const {r: sr, c: sc} = selected;
      cellEl(sr, sc).classList.remove('selected');

      if (sr === r && sc === c) {
        selected = null;
        return;
      }

      const isAdjacent = Math.abs(sr-r) + Math.abs(sc-c) === 1;
      selected = null;

      if (isAdjacent) {
        trySwap(sr, sc, r, c);
      } else {
        // Re-select new cell
        selected = {r, c};
        cellEl(r, c).classList.add('selected');
      }
    }
  }

  async function trySwap(r1, c1, r2, c2) {
    busy = true;
    // Visual swap
    [state.grid[r1][c1], state.grid[r2][c2]] = [state.grid[r2][c2], state.grid[r1][c1]];
    renderCell(r1, c1);
    renderCell(r2, c2);

    const matches = findMatches(state.grid, state.cfg.gridSize);
    if (matches.length === 0) {
      // Swap back
      await sleep(150);
      [state.grid[r1][c1], state.grid[r2][c2]] = [state.grid[r2][c2], state.grid[r1][c1]];
      renderCell(r1, c1);
      renderCell(r2, c2);
      busy = false;
      return;
    }

    state.movesLeft--;
    await processMatches();
    updateHUD();
    checkEndCondition();
    busy = false;
  }

  async function processMatches() {
    let combo = 0;
    let matches;
    do {
      matches = findMatches(state.grid, state.cfg.gridSize);
      if (matches.length === 0) break;
      combo++;

      // Score
      const pts = matches.length * 30 * combo;
      state.score += pts;
      state.maxCombo = Math.max(state.maxCombo, combo);

      // SFX
      Audio.SFX.match(matches.length);
      if (combo > 1) {
        Audio.SFX.combo(combo);
        showCombo(combo);
      }

      // Show score popup
      showScorePopup(matches, pts);

      // Animate matched cells out
      matches.forEach(({r, c}) => {
        const el = cellEl(r, c);
        if (el) el.classList.add('matched');
      });
      await sleep(400);

      // Remove matched cells (set to -1)
      matches.forEach(({r, c}) => { state.grid[r][c] = -1; });

      // Drop cells down
      for (let c = 0; c < state.cfg.gridSize; c++) {
        let emptyRow = state.cfg.gridSize - 1;
        for (let r = state.cfg.gridSize - 1; r >= 0; r--) {
          if (state.grid[r][c] !== -1) {
            state.grid[emptyRow][c] = state.grid[r][c];
            if (emptyRow !== r) state.grid[r][c] = -1;
            emptyRow--;
          }
        }
        for (let r = emptyRow; r >= 0; r--) {
          state.grid[r][c] = randomNote(state.cfg.noteTypes);
        }
      }

      // Re-render with fall animation
      for (let r = 0; r < state.cfg.gridSize; r++) {
        for (let c = 0; c < state.cfg.gridSize; c++) {
          renderCell(r, c, true);
        }
      }

      await sleep(350);

      // Check if no valid moves
      if (!hasValidMove(state.grid, state.cfg.gridSize, state.cfg.noteTypes)) {
        await shuffleGrid();
      }

    } while (true);

    updateHUD();
  }

  async function shuffleGrid() {
    Audio.SFX.shuffle();
    // Flatten, shuffle, refill
    const flat = [];
    for (let r = 0; r < state.cfg.gridSize; r++)
      for (let c = 0; c < state.cfg.gridSize; c++)
        flat.push(state.grid[r][c]);
    for (let i = flat.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i+1));
      [flat[i], flat[j]] = [flat[j], flat[i]];
    }
    let k = 0;
    for (let r = 0; r < state.cfg.gridSize; r++)
      for (let c = 0; c < state.cfg.gridSize; c++)
        state.grid[r][c] = flat[k++];

    for (let r = 0; r < state.cfg.gridSize; r++)
      for (let c = 0; c < state.cfg.gridSize; c++)
        renderCell(r, c, true);

    await sleep(400);
    if (!hasValidMove(state.grid, state.cfg.gridSize, state.cfg.noteTypes)) {
      // Reinit
      state.grid = initGrid(state.cfg.gridSize, state.cfg.noteTypes);
      buildGrid();
    }
  }

  function showScorePopup(matches, pts) {
    const container = document.getElementById('grid-container');
    const el = document.createElement('div');
    el.className = 'score-popup';
    el.textContent = '+' + pts;
    const cx = matches.reduce((s,m) => s+m.c, 0) / matches.length;
    const cr = matches.reduce((s,m) => s+m.r, 0) / matches.length;
    const cellSize = 66;
    el.style.left = (14 + cx * cellSize) + 'px';
    el.style.top  = (14 + cr * cellSize) + 'px';
    container.appendChild(el);
    setTimeout(() => el.remove(), 1000);
  }

  function showCombo(n) {
    const el = document.createElement('div');
    el.className = 'combo-badge';
    const labels = ['','','2× Combo!','3× Combo!','4× Combo!','5× Combo!'];
    el.textContent = labels[Math.min(n, 5)] || `${n}× COMBO!`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 900);
  }

  function checkEndCondition() {
    if (state.score >= state.cfg.target) {
      clearInterval(state.timerInterval);
      state.gameOver = true;
      setTimeout(() => showComplete(), 600);
      return;
    }
    if (state.movesLeft <= 0 || state.timeLeft <= 0) {
      clearInterval(state.timerInterval);
      state.gameOver = true;
      if (state.score >= state.cfg.target) {
        showComplete();
      } else {
        Audio.SFX.gameOver();
        setTimeout(() => showGameOver(), 600);
      }
    }
  }

  function showComplete() {
    Audio.SFX.levelUp();
    // Stars
    const pct = state.score / state.cfg.target;
    let stars = '⭐';
    if (pct >= 1.5) stars = '⭐⭐⭐';
    else if (pct >= 1.2) stars = '⭐⭐⭐';
    else if (pct >= 1.0) stars = '⭐⭐';
    document.getElementById('stars-display').textContent = stars;

    document.getElementById('fin-score').textContent = state.score;
    document.getElementById('fin-moves').textContent = state.cfg.moves - state.movesLeft;
    document.getElementById('fin-time').textContent = state.timeLeft + 's';
    document.getElementById('fin-combo').textContent = state.maxCombo + 'x';

    // Highscore
    const hs = parseInt(localStorage.getItem('melodymatch_hs') || '0');
    if (state.score > hs) {
      localStorage.setItem('melodymatch_hs', state.score);
      document.getElementById('new-record-div').style.display = '';
    } else {
      document.getElementById('new-record-div').style.display = 'none';
    }

    showScreen('complete-screen');
  }

  function showGameOver() {
    document.getElementById('go-score').textContent = state.score;
    document.getElementById('go-target').textContent = state.cfg.target;
    showScreen('gameover-screen');
  }

  function startLevel(levelId) {
    const cfg = levelCfg(levelId);
    state = {
      cfg,
      grid: initGrid(cfg.gridSize, cfg.noteTypes),
      score: 0,
      movesLeft: cfg.moves,
      timeLeft: cfg.time,
      gameOver: false,
      maxCombo: 0,
      timerInterval: null
    };
    selected = null;
    busy = false;

    document.getElementById('level-display').textContent = cfg.id;
    document.getElementById('target-display').textContent = cfg.target;
    updateHUD();
    buildGrid();

    // Bind cell clicks
    document.querySelectorAll('.cell').forEach(el => {
      el.addEventListener('click', () => onCellClick(+el.dataset.r, +el.dataset.c));
    });

    // Timer
    state.timerInterval = setInterval(() => {
      state.timeLeft--;
      updateHUD();
      if (state.timeLeft <= 0) checkEndCondition();
    }, 1000);

    showScreen('game-screen');
  }

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  return { startLevel, levelCfg, findHint, shuffleGrid: () => { if (!busy) shuffleGrid(); }, state: () => state };
})();

//  UI WIRING
// ═══════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  // Init audio on first interaction
  function ensureAudio() {
    Audio.init();
    Audio.startMusic();
    document.removeEventListener('click', ensureAudio);
  }
  document.addEventListener('click', ensureAudio);

  // Highscore
  document.getElementById('hs-display').textContent =
    localStorage.getItem('melodymatch_hs') || '0';

  // Level selection
  let selectedLevel = 1;
  document.querySelectorAll('.level-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedLevel = +btn.dataset.level;
    });
  });

  // Start
  document.getElementById('start-btn').addEventListener('click', () => {
    Game.startLevel(selectedLevel);
  });

  // How to play (simple alert)
  document.getElementById('how-to-btn').addEventListener('click', () => {
    alert(
      'MelodyMatch — Wie spielt man?\n\n' +
      '♩ Klicke zwei benachbarte Noten an, um sie zu tauschen.\n' +
      '♪ Bringe 3 oder mehr gleiche Noten in eine Reihe oder Spalte.\n' +
      '♫ Erreiche das Punkteziel vor dem Ablauf der Zeit oder der Züge.\n' +
      '♬ Kettenreaktionen geben Combo-Boni!\n\n' +
      '💡 Tipp — zeigt einen möglichen Zug an.\n' +
      '🔀 Mischen — mischt das Spielfeld (wenn keine Züge möglich).'
    );
  });

  // Music toggle
  document.getElementById('music-toggle').addEventListener('click', () => {
    const muted = Audio.toggleMute();
    const btn = document.getElementById('music-toggle');
    btn.textContent = muted ? '🔇' : '♪';
    btn.classList.toggle('muted', muted);
  });

  // Hint
  document.getElementById('hint-btn').addEventListener('click', () => {
    const s = Game.state();
    if (!s || !s.grid) return;
    const hint = Game.findHint(s.grid, s.cfg.gridSize);
    if (hint) {
      hint.forEach(({r, c}) => {
        const el = document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
        if (el) el.classList.add('hint');
        setTimeout(() => el && el.classList.remove('hint'), 2000);
      });
    }
  });

  // Shuffle
  document.getElementById('shuffle-btn').addEventListener('click', () => Game.shuffleGrid());

  // Menu button in game
  document.getElementById('menu-btn').addEventListener('click', () => {
    const s = Game.state();
    if (s && s.timerInterval) clearInterval(s.timerInterval);
    document.getElementById('hs-display').textContent =
      localStorage.getItem('melodymatch_hs') || '0';
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('start-screen').classList.add('active');
  });

  // Complete screen
  document.getElementById('next-level-btn').addEventListener('click', () => {
    const s = Game.state();
    const next = Math.min(s.cfg.id + 1, 6);
    // Update level selection
    document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('selected'));
    document.querySelector(`[data-level="${next}"]`).classList.add('selected');
    Game.startLevel(next);
  });
  document.getElementById('complete-menu-btn').addEventListener('click', () => {
    document.getElementById('hs-display').textContent =
      localStorage.getItem('melodymatch_hs') || '0';
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('start-screen').classList.add('active');
  });

  // Game over screen
  document.getElementById('retry-btn').addEventListener('click', () => {
    Game.startLevel(Game.state().cfg.id);
  });
  document.getElementById('gameover-menu-btn').addEventListener('click', () => {
    document.getElementById('hs-display').textContent =
      localStorage.getItem('melodymatch_hs') || '0';
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('start-screen').classList.add('active');
  });
});
</script>
</body>
</html>
